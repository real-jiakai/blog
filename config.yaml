# 网站的基本url地址
baseURL: https://blog.gujiakai.top
# 网站使用的主题
# 通过 module.imports（而非 theme: 键）挂载主题，以便用 files 排除主题 static/ 里
# 本站已用原生实现替代（jQuery/lightbox2/bootstrap JS）、从未引用、却会被整体复制进
# public/ 的文件。注意：不能排除 images/favicon.ico 和 css/style.css —— 站点没有
# 自己的副本，正是从主题取用这两个文件。
# files 取反语法是「! 」（叹号后必须带空格）；只写取反模式时其余文件默认全部挂载。
# 写成 "!xxx"（无空格）会被当作普通 glob，结果是整个挂载点什么都不包含。
# 声明 mounts 会关闭主题的默认挂载，因此 i18n 必须显式挂载：主题模板（如标签页的
# 分页 partial）依赖主题 i18n 键，缺失时会静默渲染成空字符串。
module:
  imports:
    - path: hugo-theme-simple
      mounts:
        - source: layouts
          target: layouts
        - source: archetypes
          target: archetypes
        - source: i18n
          target: i18n
        - source: static
          target: static
          files:
            - "! js/jquery-4.0.0.min.js"
            - "! js/lightbox.min.js"
            - "! js/bootstrap.bundle.min.js"
            - "! js/copy-code.js"
            - "! js/custom.js"
            - "! css/lightbox.min.css"
            - "! images/close.png"
            - "! images/loading.gif"
            - "! images/next.png"
            - "! images/prev.png"
# 第三方服务
services:
  # google分析
  googleAnalytics:
    ID: "G-2N2G7YVYD1"
  # RSS 仅保留最新 20 篇（此前全量 ~80 篇全文，单个 feed 超 1MB）
  rss:
    limit: 20
# 永久链接
permalinks:
  blog: /:year/:month/:slug
# 分页器
pagination:
  pagerSize: 5
# 开启robots.txt
enableRobotsTXT: true
# 不生成内容前置数据声明的别名页；Hugo 固有的语言/分页别名由 layouts/alias.html 标记 noindex，
# 并在 Netlify 上通过 force 规则返回真正的 301。
disableAliases: true
# 只使用 tags 分类；不声明的话 Hugo 默认还会生成空的 categories
# 页面（/categories/ 与 /en/categories/）及其 RSS
taxonomies:
  tag: tags

# 输出格式配置
# - 为每篇文章额外生成 .md 原始文件（如 /2026/06/slug.md）
# - uglyURLs 全局开启，让 .md 生成为 slug.md 而非 slug/index.md；
#   HTML / RSS 通过 noUgly 保持原有 pretty URL（/slug/、/index.xml），不影响 SEO
uglyURLs: true
outputFormats:
  HTML:
    noUgly: true
  RSS:
    noUgly: true
  MarkdownRaw:
    mediaType: text/markdown
    isPlainText: true
    isHTML: false
  # llms.txt（https://llmstxt.org）：由 layouts/home.llms.txt 按语言在构建时生成
  # （/llms.txt 与 /en/llms.txt），取代过去手工维护、容易过期的 static/ 副本
  LLMS:
    baseName: llms
    mediaType: text/plain
    isPlainText: true
    isHTML: false

# RSS输出配置 - 为每种语言生成RSS
outputs:
  home:
    - HTML
    - RSS
    - LLMS
  section:
    - HTML
    - RSS
  # 仅博客文章生成 .md 原文（通过 content/*/blog/_index.md 的 cascade.outputs 开启）；
  # about / til 等普通页面保持仅 HTML，避免产生无引用的孤立 .md
  page:
    - HTML

# 多语言设置
# 中文为默认语言，保持根路径不变（不加/zh/前缀）
# 英文使用/en/前缀
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

# 语言配置
languages:
  zh:
    languageName: "中文"
    languageCode: "zh-CN"
    weight: 1
    title: "顾佳凯的网络日志"
    contentDir: "content/zh"
    # 中文内容按 CJK 规则统计字数/阅读时长（英文站点不需要）
    hasCJKLanguage: true
    params:
      description: "一个专注于分享技术和个人经历的博客"
      keywords: "博客,技术,个人,生活"
      author: "顾佳凯"
      footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"
    menu:
      main:
        - name: "主页"
          url: "/"
          weight: 1
        - name: "归档"
          url: "/archive/"
          weight: 2
        - name: "标签"
          url: "/tags/"
          weight: 3
        - name: "til"
          url: "/til/"
          weight: 4
        - name: "关于"
          url: "/about/"
          weight: 5
  en:
    languageName: "English"
    languageCode: "en-US"
    weight: 2
    title: "Jiakai's Blog"
    contentDir: "content/en"
    params:
      description: "A blog focusing on sharing tech and personal experiences"
      keywords: "blog,tech,personal,life"
      author: "Jiakai"
      footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"
    menu:
      main:
        - name: "Home"
          url: "/"
          weight: 1
        - name: "Archive"
          url: "/archive/"
          weight: 2
        - name: "Tags"
          url: "/tags/"
          weight: 3
        - name: "TIL"
          url: "/til/"
          weight: 4
        - name: "About"
          url: "/about/"
          weight: 5

# 全局参数（作为默认值）
params:
  description: "A blog focusing on sharing tech and personal experiences"
  keywords: "blog,tech,personal,life"
  author: "jiakai"
  footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"
  # 本地、分支部署和 Deploy Preview 默认为 false；Netlify 仅在 production context 覆盖为 true。
  enableAnalytics: false

# markup设置
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    noClasses: false
    style: rose-pine-moon
    tabWidth: 4
    wrapperClass: highlight
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: 'https'
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      autoHeadingID: true
      autoHeadingIDType: 'github'
      attribute:
        block: false
        title: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false
    tableOfContents:
        startLevel: 2
        endLevel: 3
        ordered: false
