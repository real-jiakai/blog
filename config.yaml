# 网站的基本url地址
baseURL: https://blog.gujiakai.top
# 网站使用的主题
# 通过 module.imports（而非 theme: 键）挂载主题，以便用 excludeFiles 排除
# 主题 static/ 里两个从未被引用、却会被整体复制进 public/ 的文件：
# - images/hugo_step2_step3.gif（8.5MB，仅主题 README 用图）
# - js/lightbox-plus-jquery.min.js（98KB，站点已单独引入 jquery + lightbox）
module:
  imports:
    - path: hugo-theme-simple
      mounts:
        - source: layouts
          target: layouts
        - source: archetypes
          target: archetypes
        - source: static
          target: static
          excludeFiles:
            - images/hugo_step2_step3.gif
            - js/lightbox-plus-jquery.min.js
# 第三方服务
services:
  # google分析
  googleAnalytics:
    ID: "G-2N2G7YVYD1"
  # RSS 仅保留最新 20 篇（此前全量 ~80 篇全文，单个 feed 超 1MB）
  rss:
    limit: 20
# 永久链接
permalinks:
  blog: /:year/:month/:slug
# 分页器
pagination:
  pagerSize: 5
# 博文中使用了中文
hasCJKLanguage: true
# 开启robots.txt
enableRobotsTXT: true
# 只使用 tags 分类；不声明的话 Hugo 默认还会生成空的 categories
# 页面（/categories/ 与 /en/categories/）及其 RSS
taxonomies:
  tag: tags

# 输出格式配置
# - 为每篇文章额外生成 .md 原始文件（如 /2026/06/slug.md）
# - uglyURLs 全局开启，让 .md 生成为 slug.md 而非 slug/index.md；
#   HTML / RSS 通过 noUgly 保持原有 pretty URL（/slug/、/index.xml），不影响 SEO
uglyURLs: true
outputFormats:
  HTML:
    noUgly: true
  RSS:
    noUgly: true
  MarkdownRaw:
    mediaType: text/markdown
    isPlainText: true
    isHTML: false

# RSS输出配置 - 为每种语言生成RSS
outputs:
  home:
    - HTML
    - RSS
  section:
    - HTML
    - RSS
  # 仅博客文章生成 .md 原文（通过 content/*/blog/_index.md 的 cascade.outputs 开启）；
  # about / til 等普通页面保持仅 HTML，避免产生无引用的孤立 .md
  page:
    - HTML

# 多语言设置
# 中文为默认语言，保持根路径不变（不加/zh/前缀）
# 英文使用/en/前缀
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

# 语言配置
languages:
  zh:
    languageName: "中文"
    languageCode: "zh-CN"
    weight: 1
    title: "顾佳凯的网络日志"
    contentDir: "content/zh"
    params:
      description: "一个专注于分享技术和个人经历的博客"
      keywords: "博客,技术,个人,生活"
      author: "顾佳凯"
      footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"
    menu:
      main:
        - name: "主页"
          url: "/"
          weight: 1
        - name: "归档"
          url: "/archive/"
          weight: 2
        - name: "标签"
          url: "/tags/"
          weight: 3
        - name: "til"
          url: "/til/"
          weight: 4
        - name: "关于"
          url: "/about/"
          weight: 5
  en:
    languageName: "English"
    languageCode: "en-US"
    weight: 2
    title: "Jiakai's Blog"
    contentDir: "content/en"
    params:
      description: "A blog focusing on sharing tech and personal experiences"
      keywords: "blog,tech,personal,life"
      author: "Jiakai"
      footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"
    menu:
      main:
        - name: "Home"
          url: "/"
          weight: 1
        - name: "Archive"
          url: "/archive/"
          weight: 2
        - name: "Tags"
          url: "/tags/"
          weight: 3
        - name: "TIL"
          url: "/til/"
          weight: 4
        - name: "About"
          url: "/about/"
          weight: 5

# 全局参数（作为默认值）
params:
  description: "A blog focusing on sharing tech and personal experiences"
  keywords: "blog,tech,personal,life"
  author: "jiakai"
  footer: "&copy; 2022-{Year} Made with ❤️ By Jiakai"

# markup设置
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    noClasses: false
    style: rose-pine-moon
    tabWidth: 4
    wrapperClass: highlight
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: 'https'
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      autoHeadingID: true
      autoHeadingIDType: 'github'
      attribute:
        block: false
        title: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false
    tableOfContents:
        startLevel: 2
        endLevel: 3
        ordered: false
     