{{ define "main" }}
<div class="container m-3">
    <h1 class="mb-4">🏷️ {{ i18n "tagsTitle" | default "Tags" }}</h1>
    
    <div class="tag-cloud d-flex flex-wrap gap-2">
        {{ range .Data.Terms.ByCount }}
            <a href="{{ .Page.Permalink }}" class="text-decoration-none">
                <div class="tag-card d-inline-flex align-items-center px-3 py-2 rounded-pill">
                    <span class="tag-name">#{{ .Name }}</span>
                    <span class="badge rounded-pill ms-2">{{ .Count }}</span>
                </div>
            </a>
        {{ end }}
    </div>
</div>

<style>
/* 与首页分页的 margin: 2rem 0 呼应，让「标签云↔页脚」间距和「分页↔页脚」一致 */
.tag-cloud {
    margin-bottom: 2rem;
}

/* 颜色一律用 Bootstrap 主题变量（浅色值与原先的写死色号一致），
   跟随 data-bs-theme 自动适配深色模式，不要写死色号 */
.tag-card {
    background-color: var(--bs-tertiary-bg);
    border: 1px solid var(--bs-border-color);
    transition: all 0.2s ease;
}

.tag-card:hover {
    background-color: var(--bs-secondary-bg);
    transform: translateY(-2px);
}

.tag-name {
    color: var(--bs-secondary-color);
    font-size: 0.95rem;
}

.badge {
    background-color: var(--bs-primary);
    font-size: 0.8rem;
    font-weight: 500;
}
</style>
{{ end }}
